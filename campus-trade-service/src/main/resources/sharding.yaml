dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://PLACEHOLDER_HOST:PLACEHOLDER_PORT/campus_trade?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: PLACEHOLDER_USER
    password: PLACEHOLDER_PASSWORD

rules:
  - !SHARDING
    tables:
      trade_order:
        actualDataNodes: ds_0.trade_order_$->{0..1}
        tableStrategy:
          standard:
            shardingColumn: buyer_id
            shardingAlgorithmName: trade_order_inline
      trade_line:
        actualDataNodes: ds_0.trade_line_$->{0..1}
        tableStrategy:
          standard:
            shardingColumn: buyer_id
            shardingAlgorithmName: trade_line_inline
    shardingAlgorithms:
      trade_order_inline:
        type: INLINE
        props:
          algorithm-expression: trade_order_$->{buyer_id % 2}
      trade_line_inline:
        type: INLINE
        props:
          algorithm-expression: trade_line_$->{buyer_id % 2}
  - !SINGLE
    tables:
      - "ds_0.cart_entry"
      - "ds_0.trade_notify"

props:
  sql-show: false
