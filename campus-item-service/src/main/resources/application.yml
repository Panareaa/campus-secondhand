server:
  port: 8102

spring:
  application:
    name: campus-item-service
  config:
    import: optional:nacos:campus-shared.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  datasource:
    master:
      url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/campus_item?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:relife}
      password: ${MYSQL_PASSWORD:relife123}
      driver-class-name: com.mysql.cj.jdbc.Driver
    slave:
      url: jdbc:mysql://${MYSQL_SLAVE_HOST:${MYSQL_HOST:127.0.0.1}}:${MYSQL_SLAVE_PORT:${MYSQL_PORT:3306}}/campus_item?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:relife}
      password: ${MYSQL_PASSWORD:relife123}
      driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000
            logger-level: basic
          campus-stock-service:
            url: ${campus.feign.stock-service-url:}
          campus-user-service:
            url: ${campus.feign.user-service-url:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

campus:
  internal:
    token: ${INTERNAL_TOKEN:CampusRelifeInternalDevToken2026}
  feign:
    # 留空时走 Nacos 服务发现；本地无 Nacos 可设 STOCK_SERVICE_URL=http://127.0.0.1:8104
    stock-service-url: ${STOCK_SERVICE_URL:}
    user-service-url: ${USER_SERVICE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    cn.ynu.campus.relife: DEBUG
